<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alpaca Bot</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Alpaca Paper Trading</p>
          <h1>Bot Control</h1>
        </div>
        <div class="status-pill has-tooltip" id="statusPill" data-tooltip="Shows whether the repeating bot loop is running.">
          <span class="status-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </header>

      <section class="panel controls">
        <div class="control-grid">
          <label class="field">
            <span class="has-tooltip" data-tooltip="The stock or ETF symbol the bot will monitor and trade.">Ticker</span>
            <input id="symbolInput" type="text" value="F" autocomplete="off" aria-label="Ticker">
          </label>

          <label class="field">
            <span class="has-tooltip" data-tooltip="Dollar amount for each entry order. Alpaca uses this to buy fractional shares.">Position $</span>
            <input id="notionalInput" type="number" min="1" step="1" value="25" aria-label="Position dollars">
          </label>

          <label class="field">
            <span class="has-tooltip" data-tooltip="Percent below the highest observed price where the bot will sell the open position.">Trail %</span>
            <input id="trailInput" type="number" min="0.1" step="0.1" value="1.5" aria-label="Trail percent">
          </label>

          <label class="field">
            <span class="has-tooltip" data-tooltip="How often the bot wakes up to fetch data, evaluate the signal, and manage stops.">Poll sec</span>
            <input id="pollInput" type="number" min="5" step="5" value="60" aria-label="Poll seconds">
          </label>

          <label class="field">
            <span class="has-tooltip" data-tooltip="Short moving-average window in one-minute bars. Used for entry timing.">Fast SMA</span>
            <input id="fastInput" type="number" min="2" step="1" value="5" aria-label="Fast SMA">
          </label>

          <label class="field">
            <span class="has-tooltip" data-tooltip="Long moving-average window in one-minute bars. Must be greater than Fast SMA.">Slow SMA</span>
            <input id="slowInput" type="number" min="3" step="1" value="20" aria-label="Slow SMA">
          </label>
        </div>

        <div class="switch-row">
          <label class="switch">
            <input id="dryRunInput" type="checkbox" checked aria-label="Dry run">
            <span class="track"></span>
            <span class="switch-label has-tooltip" data-tooltip="When enabled, the bot prints intended orders without sending them to Alpaca.">Dry run</span>
          </label>

          <div class="button-row">
            <button id="runOnceButton" type="button" class="secondary has-tooltip" data-tooltip="Run one evaluation cycle without starting the repeating loop.">Check now</button>
            <button id="toggleButton" type="button" class="primary has-tooltip" data-tooltip="Start the repeating bot loop with the current settings.">Turn On</button>
          </div>
        </div>
      </section>

      <section class="metrics">
        <div class="metric">
          <span class="has-tooltip" data-tooltip="Shows whether the bot is simulating orders or sending paper orders to Alpaca.">Mode</span>
          <strong id="modeValue">Dry run</strong>
        </div>
        <div class="metric">
          <span class="has-tooltip" data-tooltip="Most recent completed strategy evaluation.">Last check</span>
          <strong id="lastRunValue">Never</strong>
        </div>
        <div class="metric">
          <span class="has-tooltip" data-tooltip="Next scheduled wake-up while the bot is online.">Next check</span>
          <strong id="nextRunValue">Idle</strong>
        </div>
        <div class="metric">
          <span class="has-tooltip" data-tooltip="Number of completed evaluations since the local server started.">Cycles</span>
          <strong id="cycleValue">0</strong>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 class="has-tooltip" data-tooltip="Latest account, signal, position, and order-management output from the bot.">Activity</h2>
          <span id="errorText"></span>
        </div>
        <pre id="logOutput">Waiting for a run.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
